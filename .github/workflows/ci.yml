name: CI

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: 后端测试
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 同步后端依赖
        run: uv sync --frozen --dev

      - name: 运行 API 测试
        env:
          DATABASE_URL: 'sqlite+aiosqlite:///:memory:'
          DATABASE_AUTO_CREATE_TABLES: 'false'
          JWT_SECRET_KEY: test-secret-with-at-least-thirty-two-bytes
          CHAT_AGENT_MODE: mock
          CHAT_ARTIFACT_ROOT: .data/test-artifacts
        run: uv run pytest tests/api

  backend-docker-build:
    name: 后端镜像构建校验
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 启用 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建后端镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: summarix-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  extension-build:
    name: 插件构建
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: 安装插件依赖
        run: npm ci

      - name: 构建插件
        run: npm run build