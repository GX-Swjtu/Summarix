services:
  app:
    image: langwatch/langwatch:latest
    environment:
      SKIP_ENV_VALIDATION: true
      DISABLE_PII_REDACTION: true
      DATABASE_URL: ${LANGWATCH_DATABASE_URL:-postgresql://summarix:summarix@postgres:5432/summarix?schema=langwatch}
      CLICKHOUSE_URL: ${LANGWATCH_CLICKHOUSE_URL:-http://default:langwatch@clickhouse:8123/langwatch}
      REDIS_URL: ${LANGWATCH_REDIS_URL:-redis://redis:6379}
      LANGWATCH_NLP_SERVICE: ${LANGWATCH_NLP_SERVICE:-http://langwatch_nlp:5561}
      LANGEVALS_ENDPOINT: ${LANGEVALS_ENDPOINT:-http://langevals:5562}
      LANGWATCH_ENDPOINT: http://app:5560
      INSTALL_METHOD: docker
      NODE_ENV: production
    env_file:
      - path: .env
        required: false
      - path: ../runtime/monitoring.generated.env
        required: false
    networks:
      summarix-observability:
        aliases:
          - langwatch
          - langwatch-app
    expose:
      - "5560"
    depends_on:
      clickhouse:
        condition: service_healthy

  tls_proxy:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "${LANGWATCH_PORT:-5560}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ${LANGWATCH_TLS_CERT_FILE:-../runtime/langwatch/tls/tls.crt}:/etc/nginx/tls/tls.crt:ro
      - ${LANGWATCH_TLS_KEY_FILE:-../runtime/langwatch/tls/tls.key}:/etc/nginx/tls/tls.key:ro
    restart: always
    networks:
      - summarix-observability

  workers:
    image: langwatch/langwatch:latest
    command: ["pnpm", "run", "start:workers"]
    working_dir: /app/langwatch
    environment:
      SKIP_ENV_VALIDATION: true
      DISABLE_PII_REDACTION: true
      DATABASE_URL: ${LANGWATCH_DATABASE_URL:-postgresql://summarix:summarix@postgres:5432/summarix?schema=langwatch}
      CLICKHOUSE_URL: ${LANGWATCH_CLICKHOUSE_URL:-http://default:langwatch@clickhouse:8123/langwatch}
      REDIS_URL: ${LANGWATCH_REDIS_URL:-redis://redis:6379}
      LANGWATCH_NLP_SERVICE: ${LANGWATCH_NLP_SERVICE:-http://langwatch_nlp:5561}
      LANGEVALS_ENDPOINT: ${LANGEVALS_ENDPOINT:-http://langevals:5562}
      LANGWATCH_ENDPOINT: http://app:5560
      NODE_ENV: production
    env_file:
      - path: .env
        required: false
      - path: ../runtime/monitoring.generated.env
        required: false
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: always
    expose:
      - "2999"
    networks:
      summarix-observability:
        aliases:
          - langwatch-workers

  langwatch_nlp:
    image: langwatch/langwatch_nlp:latest
    env_file:
      - path: .env
        required: false
      - path: ../runtime/monitoring.generated.env
        required: false
    ports:
      - "5561:5561"
    restart: always
    environment:
      LANGWATCH_ENDPOINT: http://app:5560
    networks:
      - summarix-observability

  langevals:
    image: langwatch/langevals:latest
    ports:
      - "5562:5562"
    restart: always
    environment:
      DISABLE_EVALUATORS_PRELOAD: true
    networks:
      - summarix-observability

  clickhouse:
    image: langwatch/clickhouse-serverless:0.2.0
    environment:
      CLICKHOUSE_PASSWORD: langwatch
    ports:
      - "8123:8123"
    volumes:
      - ${LANGWATCH_CLICKHOUSE_DATA_SOURCE:-../data/langwatch/clickhouse}:/var/lib/clickhouse
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always
    networks:
      - summarix-observability

networks:
  summarix-observability:
    name: summarix-observability

volumes:
  langwatch-clickhouse-data:
    name: summarix-langwatch-clickhouse